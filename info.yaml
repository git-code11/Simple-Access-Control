# Tiny Tapeout project information
project:
  title:        "Simple Access Control System with Keypad"
  author:       "Seidu Boluwatife, Ajugu Isreal, Ajose Victor, Stephen Adeleke"              # TODO: Fill in your name
  discord:      ""       # TODO: Fill in your discord username (optional)
  description:  "4×4 keypad access control with programmable password, fail counter, and timeout alarms"
  language:     "Verilog"
  clock_hz:     10000000  # 10 MHz clock (typical for TT06)
  tiles: "1x1"
  top_module:  "tt_um_simple_access_control"  # Must match your wrapper module name
  
  
  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_simple_access_control.v"  # Top-level wrapper (must be first)
    - "simpleaccess.v"                 # All submodules (access_control, keypad_scanner, input_buffer, countdown_timer)

# The pinout of your project
pinout:
  # Inputs (ui[7:0])
  ui[0]: "Keypad Column 0"
  ui[1]: "Keypad Column 1"
  ui[2]: "Keypad Column 2"
  ui[3]: "Keypad Column 3"
  ui[4]: "Door Sensor"
  ui[5]: "Admin Reset Button"
  ui[6]: "Program Mode Switch"
  ui[7]: ""  # Unused
  
  # Outputs (uo[7:0])
  uo[0]: "Unlock Signal"
  uo[1]: "Red LED (Denied/Alarm)"
  uo[2]: "Alarm Buzzer"
  uo[3]: "Keypad Lockout"
  uo[4]: ""  # Unused
  uo[5]: ""  # Unused
  uo[6]: ""  # Unused
  uo[7]: ""  # Unused
  
  # Bidirectional pins (uio[7:0])
  uio[0]: "Keypad Row 0 (output)"
  uio[1]: "Keypad Row 1 (output)"
  uio[2]: "Keypad Row 2 (output)"
  uio[3]: "Keypad Row 3 (output)"
  uio[4]: ""  # Unused (input)
  uio[5]: ""  # Unused (input)
  uio[6]: ""  # Unused (input)
  uio[7]: ""  # Unused (input)

# Do not change!
yaml_version: 6